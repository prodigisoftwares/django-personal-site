{% extends "base.html" %}

{% block title %}
  Sign in
{% endblock title %}

{% block content %}
  <div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-semibold tracking-tight text-zinc-900">
          Welcome back
        </h1>
        <p class="mt-1 text-sm text-zinc-500">
          Sign in to your account to continue.
        </p>
      </div>
      <div class="bg-surface border border-zinc-200 rounded-xl p-8 shadow-sm">
        <form method="post" class="tw-form">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit"
                  class="w-full mt-2 bg-brand hover:bg-brand-hover text-surface text-sm font-medium px-5 py-2.5 rounded-lg transition-colors duration-150">
            Sign in
          </button>
        </form>
      </div>
    </div>
  </div>
{% endblock content %}
