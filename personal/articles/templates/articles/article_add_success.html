{% extends "base.html" %}

{% block title %}
  Article Saved
{% endblock title %}

{% block content %}
  <div class="max-w-md mx-auto mt-16 text-center">
    <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-emerald-100 mb-4">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
      </svg>
    </div>
    <h1 class="text-xl font-semibold text-zinc-900 mb-1">Article saved</h1>
    <p class="text-sm text-zinc-500 mb-6">Your article has been saved successfully.</p>
    <a href="{% url 'articles:article_list' %}"
       class="inline-flex items-center gap-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors duration-150">
      Back to Articles
    </a>
  </div>
{% endblock content %}
