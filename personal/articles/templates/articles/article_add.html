{% extends "base.html" %}

{% block title %}
  Create New Article
{% endblock title %}

{% block content %}
  <div class="max-w-2xl">
    <h1 class="text-2xl font-bold mb-6">Create New Article</h1>
    <div class="bg-white rounded-xl border border-slate-200 p-8">
      <form method="post" class="tw-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-6 py-2 rounded-lg">
          Save Article
        </button>
      </form>
    </div>
  </div>
{% endblock content %}
