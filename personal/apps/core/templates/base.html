{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <title>
      {% block title %}
      {% endblock title %}
      — Personal
    </title>
  </head>
  <body class="bg-zinc-50 min-h-screen text-zinc-900 antialiased">
    <header class="bg-white border-b border-zinc-200">
      <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">
        <a href="/" class="font-semibold tracking-tight text-zinc-900 hover:text-zinc-600 transition-colors duration-150">
          Personal
        </a>
        {% if user.is_authenticated %}
          <div class="flex items-center gap-4">
            <span class="text-sm text-zinc-400">{{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button type="submit" class="text-sm text-zinc-500 hover:text-zinc-900 transition-colors duration-150">
                Sign out
              </button>
            </form>
          </div>
        {% endif %}
      </div>
    </header>
    <main class="max-w-5xl mx-auto px-6 py-10">
      {% block content %}
      {% endblock content %}
    </main>
  </body>
</html>
