{% extends "base.html" %}

{% block title %}
  New Article
{% endblock title %}

{% block content %}
  <div class="max-w-2xl">
    <div class="mb-8">
      <h1 class="text-2xl font-semibold tracking-tight text-zinc-900">New Article</h1>
      <p class="mt-1 text-sm text-zinc-500">Fill in the details below to create a new article.</p>
    </div>
    <div class="bg-surface border border-zinc-200 rounded-xl p-8">
      <form method="post" class="tw-form">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="pt-2 flex items-center gap-4">
          <button type="submit"
                  class="bg-brand hover:bg-brand-hover text-surface text-sm font-medium px-5 py-2.5 rounded-lg transition-colors duration-150">
            Save Article
          </button>
          <a href="{% url 'articles:article_list' %}"
             class="text-sm text-zinc-500 hover:text-zinc-900 transition-colors duration-150">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
{% endblock content %}
