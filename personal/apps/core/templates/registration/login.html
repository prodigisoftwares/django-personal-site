{% extends "base.html" %}

{% block title %}
  Login
{% endblock title %}

{% block content %}
  <div class="max-w-sm mx-auto mt-12">
    <div class="bg-white rounded-xl border border-slate-200 p-8">
      <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>
      <form method="post" class="tw-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-6 py-2 rounded-lg">
          Login
        </button>
      </form>
    </div>
  </div>
{% endblock content %}
